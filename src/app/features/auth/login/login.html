<div class="auth-container">
  <div class="hero-section">
    <div class="brand">
      <img src="/assets/cf-logo.png" alt="Logo">
      <span class="brand-name">CampusFlow</span>
    </div>
    <p class="quote">“Your Academic Community, All in One Place.”</p>
  </div>

  <div class="form-section">
    <div class="auth-card">
      <h2>Welcome back to <span>CampusFlow</span></h2>
      
      <form (ngSubmit)="onLogin()">
        <div class="input-group">
          <input 
            type="text" 
            name="username"
            [(ngModel)]="email" 
            placeholder="Enter Username" 
            required>
        </div>
        
        <div class="input-group">
          <input 
            type="password" 
            name="password"
            [(ngModel)]="password" 
            placeholder="Enter Password" 
            required>
          <div class="helper-links">
            <a routerLink="/forgot-password">Forgot Password?</a>
          </div>
        </div>
        
        <button type="submit" class="btn-primary">LOG IN</button>
      </form>
      
      <p class="switch-auth">No account yet? <a routerLink="/register">Register here</a></p>
    </div>
  </div>
</div>
