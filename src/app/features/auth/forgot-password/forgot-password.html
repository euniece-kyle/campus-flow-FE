<div class="auth-wrapper">
  <div class="form-side">
    <div class="brand">
      <img src="https://img.icons8.com/fluency/64/education.png" alt="Logo">
      <span class="brand-name">CampusFlow</span>
    </div>

    <div class="form-container">
      <h2 class="title">Forgot <span class="highlight">Password</span></h2>
      
      <form>
        <div class="input-field">
          <input type="email" placeholder="Enter Email" required>
        </div>
        
        <div class="input-field">
          <input type="password" placeholder="Enter New Password" required>
        </div>

        <div class="button-row">
          <button type="button" class="submit-btn" routerLink="/login">Back</button>
          <button type="button" class="submit-btn" (click)="onDone()">Done</button>
        </div>
      </form>
    </div>
  </div>

  <div class="image-side"></div>
</div>
