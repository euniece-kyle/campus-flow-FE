<div class="auth-wrapper">
  <div class="form-side">
    <div class="brand">
      <img src="/assets/cf-logo.png" alt="Logo">
      <span class="brand-name">CampusFlow</span>
    </div>

    <div class="form-container">
      <div *ngIf="step === 1">
        <h2 class="title">Forgot <span class="highlight">Password?</span></h2>
        <p class="instruction">Enter your registered email to find your account.</p>
        
        <form (ngSubmit)="onVerifyEmail()">
          <div class="input-field">
            <input 
              type="email" 
              name="email" 
              [(ngModel)]="email" 
              placeholder="Enter Email" 
              required>
          </div>

          <div class="button-row">
            <button type="button" class="btn-save-3d btn-secondary" routerLink="/login">Back</button>
            <button type="submit" class="btn-save-3d">Find Account</button>
          </div>
        </form>
      </div>

      <div *ngIf="step === 2">
        <h2 class="title">Reset <span class="highlight">Password</span></h2>
        <p class="instruction">Creating a new password for <b>{{ email }}</b></p>
        
        <form (ngSubmit)="onResetPassword()">
          <div class="input-field">
            <input 
              type="password" 
              name="newPassword" 
              [(ngModel)]="newPassword" 
              placeholder="Enter New Password" 
              required>
          </div>

          <div class="input-field">
            <input 
              type="password" 
              name="confirmPassword" 
              [(ngModel)]="confirmPassword" 
              placeholder="Confirm New Password" 
              required>
          </div>

          <div class="button-row">
            <button type="button" class="btn-save-3d btn-secondary" (click)="step = 1">Back</button>
            <button type="submit" class="btn-save-3d">Update</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="image-side"></div>
</div>
