<div class="booking-container">
  <div class="header-section">
    <div class="date-navigator">
      <button class="nav-btn" (click)="changeDate(-1)">Previous</button>
      <div class="current-date">
        <input type="date" [value]="dateForInput" (change)="onDateChange($event)">
        <span>{{ selectedDate | date:'fullDate' }}</span>
      </div>
      <button class="nav-btn" (click)="changeDate(1)">Next</button>
    </div>

    <div class="building-tabs">
      <button *ngFor="let b of buildings" 
              [class.active]="selectedBuilding === b"
              (click)="selectBuilding(b)">
        {{ b }}
      </button>
    </div>
  </div>

  <div class="grid-wrapper">
    <table class="booking-grid">
      <thead>
        <tr>
          <th></th>
          <th *ngFor="let p of periods">
            <div class="period-label">{{ p.label }}</div>
            <div class="period-time">({{ p.time }})</div>
          </th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let room of rooms">
          <td class="room-name">{{ room }}</td>
          <td *ngFor="let p of periods" 
              (click)="openBookingModal(room, p.label)"
              [class.booked]="getBooking(room, p.label)">
            <div class="cell-content">
              <span *ngIf="getBooking(room, p.label)" class="booked-tag">Booked</span>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<app-create-modal 
  *ngIf="isModalOpen" 
  [roomName]="targetRoom"
  [selectedDate]="selectedDate.toDateString()"
  (close)="closeModal()"
  (create)="handleNewBooking($event)">
</app-create-modal>
