<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo-container">
        <img src="/assets/cf-logo.png" alt="CampusFlow Logo" class="logo">
      </div>
      <span class="brand-text">CampusFlow</span>
    </div> 
    
    <nav class="nav">
      <div class="nav-item active">Booking</div>
      <div class="nav-item">Department <span class="arrow">></span></div>
      <div class="nav-item">Profile <span class="arrow">></span></div>
    </nav>
    
    <div class="sign-out">
      <div class="sign-out-content">
        <span class="exit-icon">🚪</span>
        <span class="sign-out-text">Sign Out</span>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="calendar-container">
      <div class="calendar-box">
        <span class="date-text">{{ selectedDate | date:'MMMM d, yyyy' }}</span>
        <span class="calendar-icon">📅</span>
        <input type="date" [value]="dateForInput" (input)="onDateChange($event)">
      </div>
    </div>

    <div class="red-header">
      <button (click)="changeDate(-1)">Previous</button>
      <span class="banner-date">{{ selectedDate | date:'EEEE, MMMM d, yyyy' }}</span>
      <button (click)="changeDate(1)">Next</button>
    </div>

    <div class="tabs">
      <button *ngFor="let b of buildings" 
              (click)="selectedBuilding = b"
              [class.active-blue]="selectedBuilding === b"
              [class.inactive-yellow]="selectedBuilding !== b">
        {{ b }}
      </button>
    </div>

    <table class="booking-grid">
      <thead>
        <tr>
          <th></th>
          <th *ngFor="let p of periods">
            {{ p.label }}<br><small>({{ p.time }})</small>
          </th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let room of rooms">
          <td class="room-label">{{ room }}</td>
          <td *ngFor="let p of periods">
            <div class="white-box" 
                 (click)="openBookingModal(room, p.label)"
                 [ngClass]="{
                   'booked-one-time': getBooking(room, p.label)?.type === 'One-Time',
                   'booked-recurring': getBooking(room, p.label)?.type === 'Recurring'
                 }">
              
              <span class="teacher-name" *ngIf="getBooking(room, p.label)">
                {{ getBooking(room, p.label).bookedBy }}
              </span>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </main>
</div>

<app-create-modal 
  *ngIf="isModalOpen" 
  [roomName]="targetRoom"
  [selectedDate]="(selectedDate | date:'EEEE, MMMM d, yyyy') ?? ''"
  (close)="closeModal()"
  (create)="handleNewBooking($event)">
</app-create-modal>
