<div class="layout">
  <main class="main">
    <div class="stats-grid">
      <div class="stat-card">
        <span class="icon-dot red-dot">🔴</span> 
        <div class="stat-info">
          <p>Today's Active Bookings</p>
          <h2>{{ activeBookings }}</h2>
        </div>
      </div>

      <div class="stat-card">
        <span class="icon-dot red-dot">🔴</span>
        <div class="stat-info">
          <p>Rooms Available Now</p>
          <h2>{{ availableNow }}</h2>
        </div>
      </div>

      <div class="stat-card">
        <span class="icon-dot red-dot">🔴</span>
        <div class="stat-info">
          <p>Total Subjects</p>
          <h2>{{ stats.totalSubjects }}</h2>
        </div>
      </div>

      <div class="stat-card btn-list" (click)="toggleBookingList()">
        <span class="icon-dot red-dot">🔴</span>
        <div class="stat-info">
          <p>Live Booking Details</p>
          <h2 class="stat-link">{{ isListVisible ? 'Hide List' : 'View List' }}</h2>
        </div>
      </div>
    </div>

    <app-create-modal 
      *ngIf="isModalOpen" 
      [roomName]="targetRoom" 
      [period]="targetPeriod"
      [selectedDate]="dateForInput"
      (close)="closeModal()"
      (bookingCreated)="onBookingCreated()">
    </app-create-modal>
  </main>
</div>
