<div class="modal-overlay" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    
    <h2 class="title">Create New <span class="highlight-text">Booking</span></h2>
    
    <div class="booking-tabs">
      <button 
        type="button" 
        class="tab-btn"
        [class.active-one-time]="selectedType === 'One-Time'" 
        (click)="selectedType = 'One-Time'">
        One-Time
      </button>

      <div class="divider"></div>

      <button 
        type="button" 
        class="tab-btn"
        [class.active-recurring]="selectedType === 'Recurring'" 
        (click)="selectedType = 'Recurring'">
        Recurring
      </button>
    </div>

    <div class="form-grid">
      <label>Date:</label>
      <div class="form-value">{{ selectedDate }}</div>
      
      <label>Room:</label>
      <div class="form-value">{{ roomName }}</div>
      
      <label>Period:</label>
      <div class="form-value">
        <select [(ngModel)]="data.period" class="custom-select">
          <option value="" disabled selected>Select Period</option>
          <option *ngFor="let p of periods" [value]="p.label">
            {{ p.label }} ({{ p.time }})
          </option>
        </select>
      </div>
      
      <label>Department:</label>
      <div class="form-value">
        <select [(ngModel)]="data.department" class="custom-select">
          <option *ngFor="let d of departments" [value]="d">{{ d }}</option>
        </select>
      </div>
      
      <label>Booked By:</label>
      <div class="form-value">
        <select [(ngModel)]="data.bookedBy" class="custom-select">
          <option *ngFor="let s of staff" [value]="s">{{ s }}</option>
        </select>
      </div>
    </div>

    <div class="button-container">
      <button type="button" class="btn-create" (click)="onCreateBooking()">
        Create Booking
      </button>
    </div>
  </div>
</div>
